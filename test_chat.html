<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Career AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary-color: #10b981;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --message-user: #2563eb;
            --message-bot: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
        }

        .logo i {
            font-size: 24px;
            color: var(--primary-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-history-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-history-item:hover {
            background: #475569;
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .model-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .model-info i {
            color: var(--secondary-color);
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .header-btn:hover {
            background: #475569;
            color: var(--text-primary);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 800px;
            margin: 0 auto 24px;
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .user-message .message-avatar {
            background: var(--message-user);
            color: white;
        }

        .bot-message .message-avatar {
            background: var(--bg-tertiary);
            color: var(--primary-color);
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message .message-text {
            color: var(--text-primary);
        }

        .bot-message .message-text {
            color: var(--text-primary);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Input Area */
        .input-container {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            padding-right: 50px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            transition: all 0.2s;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.5;
        }

        #messageInput:focus {
            border-color: var(--primary-color);
            background: #374151;
        }

        #messageInput::placeholder {
            color: var(--text-secondary);
        }

        .char-count {
            position: absolute;
            right: 16px;
            bottom: 14px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 64px;
            color: var(--primary-color);
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 600px;
            width: 100%;
        }

        .suggestion-card {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion-card:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .suggestion-card i {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .suggestion-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .suggestion-example {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .input-wrapper {
                padding: 0;
            }
            
            .messages-container {
                padding: 16px;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>Career AI</span>
                </div>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <i class="fas fa-plus"></i>
                    New Chat
                </button>
            </div>
            
            <div class="chat-history">
                <div class="chat-history-item">
                    <i class="fas fa-message"></i>
                    <span>Previous conversation</span>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="model-info">
                    <i class="fas fa-microchip"></i>
                    <span>Model: TinyLlama</span>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <div class="chat-header">
                <h1>AI Assistant</h1>
                <div class="header-actions">
                    <button class="header-btn" onclick="clearChat()">
                        <i class="fas fa-broom"></i> Clear
                    </button>
                    <button class="header-btn" onclick="toggleTheme()">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>

            <div id="messagesContainer" class="messages-container">
                <!-- Welcome Screen -->
                <div id="welcomeScreen" class="welcome-screen">
                    <i class="fas fa-sparkles welcome-icon"></i>
                    <h2 class="welcome-title">Welcome to Career AI</h2>
                    <p class="welcome-subtitle">Your intelligent assistant powered by AI</p>
                    
                    <div class="suggestions">
                        <div class="suggestion-card" onclick="sendSuggestion('Tell me about yourself')">
                            <i class="fas fa-info-circle"></i>
                            <div class="suggestion-title">Introduction</div>
                            <div class="suggestion-example">"Tell me about yourself"</div>
                        </div>
                        <div class="suggestion-card" onclick="sendSuggestion('What can you help me with?')">
                            <i class="fas fa-hands-helping"></i>
                            <div class="suggestion-title">Capabilities</div>
                            <div class="suggestion-example">"What can you help me with?"</div>
                        </div>
                        <div class="suggestion-card" onclick="sendSuggestion('Give me career advice')">
                            <i class="fas fa-briefcase"></i>
                            <div class="suggestion-title">Career Advice</div>
                            <div class="suggestion-example">"Give me career advice"</div>
                        </div>
                        <div class="suggestion-card" onclick="sendSuggestion('Help me learn programming')">
                            <i class="fas fa-code"></i>
                            <div class="suggestion-title">Programming</div>
                            <div class="suggestion-example">"Help me learn programming"</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-field-wrapper">
                        <textarea 
                            id="messageInput" 
                            placeholder="Type your message..."
                            rows="1"
                            onkeydown="handleKeyPress(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <span class="char-count">0/1000</span>
                    </div>
                    <button id="sendBtn" class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let messageHistory = [];
        let isWelcomeScreen = true;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
            
            // Update character count
            const charCount = document.querySelector('.char-count');
            charCount.textContent = `${textarea.value.length}/1000`;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function startNewChat() {
            messageHistory = [];
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = document.getElementById('welcomeScreen').outerHTML;
            isWelcomeScreen = true;
        }

        function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                startNewChat();
            }
        }

        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || message.length > 1000) return;

            // Remove welcome screen if it's the first message
            if (isWelcomeScreen) {
                document.getElementById('welcomeScreen').remove();
                isWelcomeScreen = false;
            }

            const messagesContainer = document.getElementById('messagesContainer');
            const sendBtn = document.getElementById('sendBtn');

            // Add user message
            const userMessageHtml = `
                <div class="message user-message">
                    <div class="message-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-header">You</div>
                        <div class="message-text">${escapeHtml(message)}</div>
                    </div>
                </div>
            `;
            messagesContainer.insertAdjacentHTML('beforeend', userMessageHtml);

            // Clear input and disable button
            input.value = '';
            autoResize(input);
            sendBtn.disabled = true;

            // Add typing indicator
            const typingHtml = `
                <div class="message bot-message" id="typingIndicator">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-header">AI Assistant</div>
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.insertAdjacentHTML('beforeend', typingHtml);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Remove typing indicator
                document.getElementById('typingIndicator').remove();

                // Add bot response
                const botMessageHtml = `
                    <div class="message bot-message">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-header">AI Assistant</div>
                            <div class="message-text">${escapeHtml(data.message || 'Sorry, I encountered an error.')}</div>
                        </div>
                    </div>
                `;
                messagesContainer.insertAdjacentHTML('beforeend', botMessageHtml);

                // Store in history
                messageHistory.push({
                    user: message,
                    bot: data.message
                });

            } catch (error) {
                document.getElementById('typingIndicator')?.remove();
                
                const errorHtml = `
                    <div class="message bot-message">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-header">AI Assistant</div>
                            <div class="message-text">Sorry, I couldn't connect to the server. Please make sure the Flask app is running.</div>
                        </div>
                    </div>
                `;
                messagesContainer.insertAdjacentHTML('beforeend', errorHtml);
            }

            // Re-enable button and scroll to bottom
            sendBtn.disabled = false;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleTheme() {
            // Theme toggle functionality can be implemented here
            alert('Theme toggle coming soon!');
        }

        // Focus on input when page loads
        window.onload = () => {
            document.getElementById('messageInput').focus();
        };
    </script>
</body>
</html>
